[build]
builder = "NIXPACKS"
# We only need to install dependencies for the backend. 
# We explicitly override the build command to prevent Railway from running the Vite frontend 'build' script.
buildCommand = "npm install && python -m pip install --break-system-packages -r backend/quant/requirements.txt"

[deploy]
# Start the Express server
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"

[env]
# Railway will dynamically assign a PORT, but we set a default fallback
PORT = "8080"
