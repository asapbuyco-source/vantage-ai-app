# nixpacks.toml — Railway build configuration
# Uses aptPkgs (Ubuntu apt) to add Python 3 alongside the auto-detected Node.js.
# Do NOT use nixPkgs here — it replaces (not adds to) Nixpacks' Node.js nix packages,
# which causes "npm: command not found" during the install phase.

[phases.setup]
aptPkgs = ["python3", "python3-pip", "python3-dev"]
