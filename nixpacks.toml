# nixpacks.toml — Railway build configuration
# Both Node.js and Python are now in nixPkgs so they share the same PATH.
# This fixes the issue where python3 was not findable by the Node.js quant service runner
# because apt-installed packages and nix packages use separate PATH environments.

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "stdenv.cc.cc.lib"]

[phases.build]
cmds = ["python3 -m pip install -r backend/quant/requirements.txt"]

# Inject Nix profile paths into the runtime environment so `python3` is
# resolvable by the Node.js process that spawns Python child processes.
[variables]
PATH = "/nix/var/nix/profiles/default/bin:/root/.nix-profile/bin:/usr/local/bin:/usr/bin:/bin"
