# nixpacks.toml — Railway build configuration
# aptPkgs adds Python 3 via Ubuntu apt (runs alongside the nix Node.js setup).
# nixPkgs pins Node.js to v20 (packages like Firebase & react-router require >=20).

[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = ["python3", "python3-pip", "python3-dev"]
