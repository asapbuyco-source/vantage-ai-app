<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="80"/>
  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="180" fill="#22d3ee" opacity="0.04"/>
  <circle cx="300" cy="280" r="120" fill="#a855f7" opacity="0.05"/>
  <!-- V shape -->
  <polygon
    points="96,140 196,140 256,300 316,140 416,140 256,380"
    fill="url(#vGrad)"
    filter="url(#glow)"
    opacity="0.95"
  />
  <!-- Inner V cutout for hollow effect -->
  <polygon
    points="140,140 196,140 256,280 316,140 372,140 256,340"
    fill="url(#bgGrad)"
    opacity="0.6"
  />
</svg>
