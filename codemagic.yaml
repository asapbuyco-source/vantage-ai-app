workflows:
  android-release:
    name: Vantage AI — Android Release Build
    max_build_duration: 60
    environment:
      node: 22.14.0
      java: 21
      vars:
        PACKAGE_NAME: "com.vantageai.app"
      android_signing:
        - vantage_keystore
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Set environment variables
        script: |
          echo "VITE_TARGET=android" >> .env.local
          echo "VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY" >> .env.local
          echo "VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN" >> .env.local
          echo "VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID" >> .env.local
          echo "VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET" >> .env.local
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID" >> .env.local
          echo "VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID" >> .env.local
          echo "VITE_ADMIN_EMAIL=$VITE_ADMIN_EMAIL" >> .env.local
          echo "VITE_BACKEND_URL=$VITE_BACKEND_URL" >> .env.local
          echo "VITE_REVENUECAT_GOOGLE_API_KEY=$VITE_REVENUECAT_GOOGLE_API_KEY" >> .env.local

      - name: Set up keystore properties
        script: |
          cat >> android/keystore.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF



      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android release AAB and APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - abrackly@gmail.com
        notify:
          success: true
          failure: true
