[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://vantageai.online https://vantage-ai-backend.railway.app http://localhost:8080 https://firestore.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://firebase.googleapis.com https://api.sportmonks.com https://live.fapshi.com https://api.openai.com https://generativelanguage.googleapis.com https://www.facebook.com https://connect.facebook.net https://mpc-prod-25-s6uit34pua-wl.a.run.app https://demo-1.conversionsapigateway.com; frame-src https://www.facebook.com https://accounts.google.com; worker-src 'self' blob:"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"


[[redirects]]
  from = "/predictions/*"
  to = "https://vantage-ai-backend.railway.app/predictions/:splat"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "https://vantage-ai-backend.railway.app/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200