[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://vantageai.online http://localhost:8080 https://firestore.googleapis.com https://www.googleapis.com https://api.sportmonks.com https://live.fapshi.com https://api.openai.com https://generativelanguage.googleapis.com; frame-src https://www.facebook.com"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[redirects]]
  from = "/predictions/*"
  to = "https://vantage-ai-backend.railway.app/predictions/:splat"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "https://vantage-ai-backend.railway.app/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200